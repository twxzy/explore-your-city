<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Simples de JSON</title>
    <link rel="stylesheet" href="style.css">

    <!--BOOTSTRAP ICONS-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
   <div class="main-container">
     <!--Title-->
     <div class="header">
        <h1>Explore sua Cidade</h1>
        <p>Explore os dados sobre poluição e localização de sua cidade: longitude e latitude.</p>
    </div>
    <!--Input Container-->
    <div class="input-container">
        <!--Select and Input-->
        <div class="form-element">
            <form>
                <select id="options" name="options">
                    <option value="AC"> AC </option>
                    <option value="AL"> AL </option>
                    <option value="AP"> AP </option>
                    <option value="AM"> AM </option>
                    <option value="BA"> BA </option>
                    <option value="CE"> CE </option>
                    <option value="DF"> DF </option>
                    <option value="ES"> ES </option>
                    <option value="GO"> GO</option>
                    <option value="MA"> MA </option>
                    <option value="MT"> MT </option>
                    <option value="MS"> MS </option>
                    <option value="MG"> MG </option>
                    <option value="PA"> PA </option>
                    <option value="PB"> PB </option>
                    <option value="PR"> PR </option>
                    <option value="PE"> PE </option>
                    <option value="PI"> PI </option>
                    <option value="RJ"> RJ</option>
                    <option value="RN"> RN </option>
                    <option value="RS"> RS </option>
                    <option value="RO"> RO </option>
                    <option value="RR"> RR </option>
                    <option value="SC"> SC </option>
                    <option value="SP"> SP </option>
                    <option value="SE"> SE </option>
                    <option value="TO"> TO </option>
                </select>
            </form>
        </div>
        <div class="form-element-search">
            <form class="form-text" action="form">
                <input placeholder="Ex: Rio de Janeiro" type="text">
            </form>
        </div>
        <!--Button-->
        <div class="form-element">
            <button><i style="color: black;" class="bi bi-search"></i></button>
        </div>
    </div>
    <!--Quality Indicator-->
    <div class="quality-indicator">
        <div class="indicator-bar"></div>
    </div>
    <!--Options-->
    <div class="options-container">
        <div class="options-header">
            <h2 class="city-name">Rio de Janeiro - RJ</h2>
        </div>
        <!--Password Length-->
        <div class="password-length">
            <div class="length-input">
                <!-- Inserir conteúdo aqui -->
            </div>
            <!--Checkbox Options-->
            <div class="checkbox-options">
                <div class="checkbox-element">
                    <!-- Inserir conteúdo aqui -->
                </div>
                <div class="checkbox-element">
                    <!-- Inserir conteúdo aqui -->
                </div>
                <div class="checkbox-element">
                    <!-- Inserir conteúdo aqui -->
                </div>
            </div>
        </div>
    </div>
   </div>
   <script src="script.js"></script>
</body>
</html>
